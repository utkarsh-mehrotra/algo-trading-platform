spring:
  application:
    name: trading-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/trading_platform
    username: algo
    password: password
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    export:
      prometheus:
        enabled: true

trading:
  config:
    path: strategies.yml

resilience4j.retry:
  instances:
    kiteApi:
      maxAttempts: 3
      waitDuration: 500ms
      enableExponentialBackoff: true
      exponentialBackoffMultiplier: 2
      maxWaitDuration: 2000ms
      enableRandomizedWait: true 
